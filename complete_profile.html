<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Завершение регистрации</title>
</head>
<body>
<h2>Добро пожаловать, {{ user.fio }}!</h2>
<p>Для завершения настройки профиля укажите ваше направление подготовки и год поступления.</p>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
    <label>Направление подготовки:
        <select name="direction" required>
            <option value="">— выберите —</option>
            {% for d in directions %}
                <option value="{{ d.id }}">{{ d.code }} — {{ d.name }} ({{ d.year }})</option>
            {% endfor %}
        </select>
    </label>
    <br><br>
    <label>Год поступления:
        <input type="number" name="admission_year"
               min="2000" max="{{ current_year }}"
               value="{{ current_year }}" required>
    </label>
    <br><br>
    <button type="submit">Сохранить и войти</button>
</form>
</body>
</html>
