version: "3.9"

services:
  flask:
    build: ./app
    ports:
      - "5000:5000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: mysql+pymysql://kursuser:OoRa2Oob@host.docker.internal/Kurs
      SECRET_KEY: your_secret_key
      CLOJURE_URL: http://kurs2.ybgv.cs.prv:3000

  clojure:
    build: ./coursepaper-demonstrator
    ports:
      - "3000:3000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FLASK_URL: http://kurs2.ybgv.cs.prv:5000
      DB_HOST: host.docker.internal
