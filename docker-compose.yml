version: "3.9"

services:
  flask:
    build: ./app
    ports:
      - "5000:5000"
    restart: always
    # Даёт контейнеру доступ к хост-машине как host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: mysql+pymysql://root:OoRa2Oob@host.docker.internal/Kurs
      SECRET_KEY: your_secret_key

  clojure:
    build: ./coursepaper-demonstrator
    ports:
      - "3000:3000"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
