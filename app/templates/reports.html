{% extends 'layout.html' %}

{% block title %}Отчёты{% endblock %}

{% block content %}
<style>
  .nav-btn { text-decoration: none; border: 1px solid #0000EE; padding: 5px 12px;
    border-radius: 4px; font-size: 13px; color: #0000EE; }
  .nav-btn:hover { background: #f0f0f0; }
  .page-nav-bottom { margin-top: 30px; padding: 12px 0; border-top: 1px solid #ccc;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .page-nav-bottom a { text-decoration: none; border: 1px solid #0000EE; padding: 5px 14px;
    border-radius: 4px; color: #0000EE; font-size: 13px; }
  .page-nav-bottom a:hover { background: #f0f4ff; }
  .page-nav-bottom a.danger { border-color: red; color: red; }
  .page-nav-bottom a.danger:hover { background: #fff0f0; }
</style>

<div style="display: flex; justify-content: space-between; align-items: center;">
  <h1>Сформировать отчёт</h1>
  <a href="{{ url_for('dashboard') }}" class="nav-btn">← Главная</a>
</div>
<hr>

<p>Отчёт содержит список всех дисциплин и записанных на них студентов в формате PDF.</p>

<form method="POST" action="{{ url_for('reports_bp.generate_reports') }}">
  <button type="submit" class="nav-btn" style="cursor:pointer; background:white;">
    Сформировать и скачать PDF
  </button>
</form>

<div class="page-nav-bottom">
  <a href="{{ url_for('director_dashboard') }}">Панель дирекции</a>
  <a href="{{ url_for('manage_courses_bp.manage_courses') }}">Управление дисциплинами</a>
  <a href="{{ url_for('manage_students_courses') }}">Распределение студентов</a>
  <a href="{{ url_for('dashboard') }}">Главная</a>
  <a href="{{ url_for('logout') }}" class="danger">Выйти</a>
</div>
{% endblock %}
